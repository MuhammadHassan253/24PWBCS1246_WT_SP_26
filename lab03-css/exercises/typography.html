<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 2 - Typography Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Roboto:wght@300&family=Dancing+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1 class="font-serif">Elegant Serif Font</h1>
    <p class="font-sans">This is a clean Sans-Serif font using relative units (rem).</p>
    <p class="font-cursive">And this is a creative Cursive font!</p>

    <hr>

    <div class="text-examples">
        <h2 class="shadow-text">Text Shadow Effect</h2>
        <p class="align-left">This text is aligned to the <b>left</b>.</p>
        <p class="align-center">This text is <b>centered</b> to show balance.</p>
        <p class="align-right">This text is aligned to the <b>right</b>.</p>
        <p class="transform-text">this text was lowercase but is now uppercase.</p>
    </div>
</div>

</body>
</html>
