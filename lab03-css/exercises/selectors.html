<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 1 - CSS Selectors Practice</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

    <h1 id="main-title">CSS Selector Practice</h1>

    <div class="container">
        <p class="intro-text">This paragraph uses a <b>class selector</b>.</p>

        <div class="content-box">
            <p>This is a child of the content box (Combinator test).</p>
            <span>This is a span inside the div.</span>
        </div>

        <hr>

        <h3>Attribute Selectors Test</h3>
        <input type="text" placeholder="Type name here...">
        <input type="password" placeholder="Enter password...">
        <input type="email" value="readonly@example.com" readonly>

        <hr>

        <h3>Pseudo-classes Test</h3>
        <ul class="item-list">
            <li>First Item</li>
            <li>Second Item</li>
            <li>Third Item</li>
            <li>Fourth Item</li>
            <li>Fifth Item</li>
        </ul>

        <a href="https://google.com" class="button-link">Hover over me!</a>
    </div>

</body>
</html>
