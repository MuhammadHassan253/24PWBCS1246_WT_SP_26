<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 7 - Card Component Design</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>Featured Collections</h1>

    <div class="card-grid">
        <div class="card">
            <div class="card-image">
                <img src="../../dress1.jpg" alt="Luxury Dress">
            </div>
            <div class="card-content">
                <h2 class="card-title">Embroidered Festive</h2>
                <p class="card-description">Exquisite craftsmanship with traditional patterns for your special occasions.</p>
                <button class="card-btn">View Collection</button>
            </div>
        </div>

        <div class="card">
            <div class="card-image">
                <img src="../../dress2.jpg" alt="Casual Wear">
            </div>
            <div class="card-content">
                <h2 class="card-title">Summer Lawn</h2>
                <p class="card-description">Breathable fabrics and vibrant prints designed for everyday comfort.</p>
                <button class="card-btn">View Collection</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
