<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 5 - Button Collection</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>Button Styling Collection</h1>

    <div class="button-section">
        <h3>Shapes and Colors</h3>
        <button class="btn btn-pill">Pill Shape</button>
        <button class="btn btn-square">Square</button>
        <button class="btn btn-gradient">Gradient</button>
    </div>

    <div class="button-section">
        <h3>States (Hover & Focus)</h3>
        <button class="btn btn-outline">Outline Button</button>
        <button class="btn btn-shadow">Floating Shadow</button>
        <button class="btn btn-disabled" disabled>Disabled State</button>
    </div>
</div>

</body>
</html>
