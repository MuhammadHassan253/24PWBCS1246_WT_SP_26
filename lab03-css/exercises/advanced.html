<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 10 - Advanced Effects</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>Advanced CSS Showcase</h1>

    <div class="effect-section">
        <h2 class="gradient-text">Premium Collection</h2>
        <p>Text with a background linear gradient clipped to the characters.</p>
    </div>

    <div class="effect-section">
        <h3>Newsletter Subscription</h3>
        <label class="custom-checkbox">
            <input type="checkbox">
            <span class="checkmark"></span>
            I agree to the terms and conditions
        </label>
    </div>

    <div class="effect-section">
        <h3>Processing Request...</h3>
        <div class="loader"></div>
    </div>

    <div class="effect-section">
        <div class="glass-card">
            <h3>Glassmorphism Card</h3>
            <p>Using backdrop filters and complex shadows for depth.</p>
        </div>
    </div>
</div>

</body>
</html>
