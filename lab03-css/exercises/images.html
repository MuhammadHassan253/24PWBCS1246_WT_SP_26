<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4 - Image Styling</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>Image Styling Portfolio</h1>

    <div class="image-gallery">
        <div class="img-box">
            <h3>Circular & Rounded</h3>
            <img src="../../dress1.jpg" class="img-circle" alt="Dress 1">
        </div>

        <div class="img-box">
            <h3>Borders & Shadows</h3>
            <img src="../../dress2.jpg" class="img-styled" alt="Dress 2">
        </div>

        <div class="img-box">
            <h3>CSS Filters (Grayscale)</h3>
            <img src="../../dress3.jpg" class="img-filter" alt="Dress 3">
        </div>

        <div class="img-box overlay-container">
            <h3>Text Overlay</h3>
            <div class="img-wrapper">
                <img src="../../dress6.jpg" alt="Dress 6">
                <div class="overlay-text">Elegant Couture</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
