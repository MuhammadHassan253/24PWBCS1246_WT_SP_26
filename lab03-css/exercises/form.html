<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6 - Form Styling</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>Member Registration</h1>
    <form class="custom-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="input-field focus-state" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="input-field error-state" value="invalid-email" required>
            <span class="error-msg">Please enter a valid email address.</span>
        </div>

        <div class="form-group">
            <label>Membership Type</label>
            <select class="custom-select">
                <option>Standard</option>
                <option>Premium</option>
                <option>VIP</option>
            </select>
        </div>

        <div class="form-group">
            <label>Account Status</label>
            <input type="text" class="input-field success-state" value="Username Available!" readonly>
        </div>

        <button type="submit" class="btn btn-pill">Register Now</button>
    </form>
</div>

</body>
</html>
