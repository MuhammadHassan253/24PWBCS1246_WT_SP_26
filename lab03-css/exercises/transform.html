<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 9 - CSS Transforms</title>
    <link rel="stylesheet" href="../styles/stylesheet.css">
</head>
<body>

<div class="container">
    <h1>CSS Transform Gallery</h1>

    <div class="transform-grid">
        <div class="transform-box">
            <div class="box rotate">Rotate 45°</div>
            <p>2D Rotation</p>
        </div>

        <div class="transform-box">
            <div class="box scale">Scale Up</div>
            <p>Scaling (Hover)</p>
        </div>

        <div class="transform-box">
            <div class="box translate">Move Me</div>
            <p>Translation</p>
        </div>

        <div class="transform-box flip-container">
            <div class="box flip-card">
                <div class="front">3D Flip</div>
                <div class="back">Back Side</div>
            </div>
            <p>3D Transform</p>
        </div>
    </div>
</div>

</body>
</html>
