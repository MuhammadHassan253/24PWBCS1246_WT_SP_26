<!DOCTYPE html>
<html>
<head>
  <title>Cart - Riwayat Couture</title>
</head>

<body>

<header>

  <h1>Riwayat Couture</h1>

  <nav>
    <a href="Dashboard.html">Home</a>
    <a href="Shop.html">Shop</a>
    <a href="categories.html">Categories</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">🛒 Cart</a>
  </nav>

</header>

<main>

  <h2>Your Shopping Cart</h2>

  <p>No items added yet.</p>

  <button onclick="orderSuccess()">Checkout</button>

  <script>
    function orderSuccess() {
      alert("Order placed successfully! Thank you for shopping with Riwayat Couture.");
    }
  </script>

  <h2>Your Cart</h2>

  <div id="cartItems"></div>

  <button onclick="goCheckout()">Checkout</button>

</main>

<footer>

  <p>© 2026 Riwayat Couture</p>

</footer>

<script>

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let cartDiv = document.getElementById("cartItems");

  cart.forEach(item => {
    cartDiv.innerHTML += "<p>" + item.name + " - Rs." + item.price + "</p>";
  });

  function goCheckout(){
    window.location.href="checkout.html";
  }

</script>



</body>
</html>
