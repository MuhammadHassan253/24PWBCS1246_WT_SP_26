<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Schedule - Irsa Khan</title>
    <style>
        /* Consistent Animated Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Table Container */
        .table-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h2 { margin-bottom: 25px; font-weight: 600; }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        /* Back Link */
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: white; transform: translateX(-5px); }
    </style>
</head>
<body>

<div class="table-container">
    <h2>My Weekly Course Schedule</h2>
    <table>
        <thead>
        <tr>
            <th>Day</th>
            <th>Time</th>
            <th>Course Name</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Monday</td>
            <td>09:00 AM</td>
            <td>Web Technologies</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>11:00 AM</td>
            <td>Database Systems</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>01:00 PM</td>
            <td>Operating Systems</td>
        </tr>
        <tr>
            <td>Thursday</td>
            <td>10:00 AM</td>
            <td>Software Engineering</td>
        </tr>
        <tr>
            <td>Friday</td>
            <td>09:00 AM</td>
            <td>Lab Session</td>
        </tr>
        </tbody>
    </table>
    <a href="../index.html" class="back-link">← Back to Homepage</a>
</div>

</body>
</html>
