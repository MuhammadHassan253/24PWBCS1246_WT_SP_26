<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Irsa Khan</title>
    <style>
        /* Consistent Animated Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Form Card */
        .form-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: white;
        }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; }

        /* Form Styling */
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box; /* Ensures padding doesn't break layout */
            outline: none;
            transition: 0.3s;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        input:focus { background: rgba(255, 255, 255, 0.2); border-color: white; }

        /* Submit Button */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ec4899;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #f0f0f0;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration</h2>
    <form>
        <label for="studentName">Full Name</label>
        <input type="text" id="studentName" placeholder="Enter your name" required>

        <label for="regNum">Registration Number</label>
        <input type="text" id="regNum" placeholder="e.g. 22P-8000" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>

        <label for="course">Select Course</label>
        <select id="course">
            <option value="web">Web Technologies</option>
            <option value="db">Database Systems</option>
            <option value="os">Operating Systems</option>
        </select>

        <button type="submit">Register Now</button>
    </form>
    <a href="../index.html" class="back-link">← Return to Homepage</a>
</div>

</body>
</html>
