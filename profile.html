<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile - Irsa Khan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Matching the pink/purple theme from your screenshot */
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Makes the image circular */
            object-fit: cover;
            border: 4px solid white;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 10px 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .contact-info {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #8b5cf6;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="profile-card">
    <img src="IrsaKhan.jpg" alt="Irsa Khan" class="profile-pic">

    <h1>Irsa Khan</h1>
    <p>I am a student at UET Peshawar studying Web Technologies.</p>

    <div class="contact-info">
        Email: irsakhan1882006@gmail.com
    </div>

    <a href="index.html" class="back-btn">← Back to Portfolio</a>
</div>

</body>
</html>
