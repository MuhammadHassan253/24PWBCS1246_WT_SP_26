<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Riwayaat Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FDFBF7;
            --zinc: #2C3539;
            --gold: #C5A059;
            --zinc-glow: rgba(44, 53, 57, 0.1);
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--cream);
            color: var(--zinc);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            padding: 30px 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(44, 53, 57, 0.05);
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 2px; }

        nav { display: flex; gap: 30px; }
        nav a {
            text-decoration: none; color: var(--zinc); font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px; transition: var(--transition);
        }
        nav a:hover { color: var(--gold); letter-spacing: 2px; }

        /* --- CATEGORIES SECTION --- */
        .category-bar {
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: white;
            border-bottom: 1px solid rgba(44, 53, 57, 0.05);
            /* Content now fades in immediately on load */
            animation: revealUp 1s ease forwards;
        }
        .cat-btn {
            padding: 10px 25px;
            border: 1px solid var(--zinc);
            background: transparent;
            color: var(--zinc);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
        }
        .cat-btn:hover {
            background: var(--zinc);
            color: var(--gold);
            box-shadow: 0 5px 15px var(--zinc-glow);
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; padding: 50px 5% 100px;
            animation: revealUp 1.2s ease forwards;
        }
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            background: white; padding: 20px; text-align: center;
            transition: var(--transition); border: 1px solid transparent;
        }
        .product-card:hover {
            border-color: var(--gold); transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .product-card img {
            width: 100%; height: 420px; object-fit: cover;
            margin-bottom: 20px; transition: var(--transition);
        }

        .product-card h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 8px; }
        .product-card p { color: var(--gold); font-weight: 600; margin-bottom: 20px; }

        /* --- BUTTONS --- */
        .btn-order {
            background: var(--zinc); color: var(--cream); border: none;
            padding: 12px 35px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; font-size: 0.75rem; transition: var(--transition);
        }
        .btn-order:hover {
            background: var(--gold); color: white;
            box-shadow: 0 8px 20px rgba(197, 160, 89, 0.3);
        }

        footer {
            padding: 60px 5%; background: var(--zinc); color: var(--cream);
            text-align: center; font-size: 0.8rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <img src="Logo.jpeg" alt="Logo" width="50">
        <h1>Riwayaat Couture</h1>
    </div>
    <nav>
        <a href="Dashboard.html">Home</a>
        <a href="Shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="category-bar">
    <button class="cat-btn">All Collection</button>
    <button class="cat-btn">Embroidered</button>
    <button class="cat-btn">Festive Wear</button>
    <button class="cat-btn">Summer Lawn</button>
    <button class="cat-btn">Party Wear</button>
</section>

<main>
    <div class="product-grid">
        <article class="product-card">
            <img src="Dress1.jpg" alt="Dress 1">
            <h3>Embroidered Suit</h3>
            <p>PKR 3,490</p>
            <button class="btn-order">Order Now</button>
        </article>

        <article class="product-card">
            <img src="Dress2.jpg" alt="Dress 2">
            <h3>Festive Lawn Dress</h3>
            <p>PKR 3,999</p>
            <button class="btn-order">Order Now</button>
        </article>

        <article class="product-card">
            <img src="Dress3.jpg" alt="Dress 3">
            <h3>Casual Summer Suit</h3>
            <p>PKR 2,999</p>
            <button class="btn-order">Order Now</button>
        </article>

        <article class="product-card">
            <img src="Dress7.jpg" alt="Dress 4">
            <h3>Wedding Festive Wear</h3>
            <p>PKR 4,999</p>
            <button class="btn-order">Order Now</button>
        </article>

        <article class="product-card">
            <img src="Dress8.jpg" alt="Dress 5">
            <h3>Printed Lawn Suit</h3>
            <p>PKR 5,899</p>
            <button class="btn-order">Order Now</button>
        </article>

        <article class="product-card">
            <img src="Dress6.jpg" alt="Dress 6">
            <h3>Party Wear Dress</h3>
            <p>PKR 4,200</p>
            <button class="btn-order">Order Now</button>
        </article>
    </div>
</main>

<footer>
    <p>© 2026 RIWAYAAT COUTURE | ELEGANCE REDEFINED</p>
</footer>

</body>
</html>
